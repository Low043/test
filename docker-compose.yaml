services:
  db-dev:
    image: postgres:15
    container_name: express-postgres-dev
    restart: unless-stopped
    ports:
      - '${DB_PORT}:5432'
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - express-db-data:/var/lib/postgresql/data

volumes:
  express-db-data: